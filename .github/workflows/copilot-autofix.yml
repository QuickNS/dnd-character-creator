# Automatically assign the Copilot coding agent to issues labeled "copilot"
# This triggers the agent to autonomously create a branch, fix the issue, and open a PR.
#
# Usage: Add the "copilot" label to any open issue to trigger.
# The agent reads .github/copilot-instructions.md for project conventions.

name: Assign Copilot to Issues
on:
  issues:
    types: [labeled]

jobs:
  assign-copilot:
    if: github.event.label.name == 'copilot'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign Copilot to issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['copilot']
            });
